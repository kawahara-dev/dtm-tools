<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPM・小節・秒数計算ツール | DTM初心者向け無料ツール集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="back-link" href="index.html">← ツール一覧に戻る</a>
        <h1 class="site-title">BPM・小節・秒数計算ツール</h1>
        <p class="site-description">
          BPMと小節数から、曲のセクションの長さをサクッと確認しよう。
        </p>
      </div>
    </header>

    <main class="container">
      <section class="card" aria-labelledby="input-heading">
        <h2 id="input-heading">入力</h2>
        <form id="bpm-form" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="bpm-input">BPM</label>
              <input
                id="bpm-input"
                name="bpm"
                type="number"
                min="1"
                max="400"
                value="120"
                inputmode="decimal"
                required
              />
            </div>

            <div class="form-group">
              <label for="bars-input">小節数</label>
              <input
                id="bars-input"
                name="bars"
                type="number"
                min="1"
                max="2000"
                value="16"
                inputmode="decimal"
                required
              />
            </div>

            <div class="form-group">
              <label for="time-signature">拍子</label>
              <select id="time-signature" name="timeSignature">
                <option value="4/4" selected>4/4</option>
                <option value="3/4">3/4</option>
                <option value="6/8">6/8</option>
              </select>
            </div>
          </div>

          <div class="preset-area" aria-label="BPMプリセット">
            <p class="preset-title">BPMプリセット</p>
            <div class="preset-buttons">
              <button type="button" class="preset-button" data-bpm="80">80</button>
              <button type="button" class="preset-button" data-bpm="90">90</button>
              <button type="button" class="preset-button" data-bpm="100">100</button>
              <button type="button" class="preset-button" data-bpm="120">120</button>
              <button type="button" class="preset-button" data-bpm="128">128</button>
              <button type="button" class="preset-button" data-bpm="140">140</button>
              <button type="button" class="preset-button" data-bpm="160">160</button>
            </div>
          </div>

          <p id="error-message" class="error-message" role="alert" aria-live="assertive"></p>
        </form>
      </section>

      <section class="card" aria-labelledby="result-heading">
        <div class="result-header">
          <h2 id="result-heading">計算結果</h2>
          <button id="copy-button" class="copy-button" type="button">
            結果をコピー
          </button>
        </div>
        <p id="copy-status" class="copy-status" aria-live="polite"></p>

        <dl id="result-list" class="result-list"></dl>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
