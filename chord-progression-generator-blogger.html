<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>コード進行ジェネレーター（Blogger貼り付け用）</title>
    <style>
      .chord-tool-wrapper {
        --bg: #f5fbf7;
        --card-bg: #ffffff;
        --text-main: #203127;
        --text-sub: #4d6759;
        --primary: #4ba57f;
        --primary-dark: #32795b;
        --border: #d6e8dc;
        --error: #c84141;
        --shadow: 0 8px 24px rgba(38, 109, 79, 0.08);
        margin: 0;
        font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text-main);
        line-height: 1.6;
      }

      .chord-tool-wrapper *,
      .chord-tool-wrapper *::before,
      .chord-tool-wrapper *::after {
        box-sizing: border-box;
      }

      .chord-tool-wrapper .container {
        width: min(960px, 92%);
        margin: 0 auto;
        padding: 1rem 0;
      }

      .chord-tool-wrapper .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 1.25rem;
        margin-bottom: 1rem;
      }

      .chord-tool-wrapper h1 {
        margin: 0;
        font-size: clamp(1.5rem, 3vw, 2rem);
      }

      .chord-tool-wrapper .description {
        margin: 0.5rem 0 0;
        color: var(--text-sub);
      }

      .chord-tool-wrapper h2 {
        margin-top: 0;
        margin-bottom: 1rem;
        font-size: 1.2rem;
      }

      .chord-tool-wrapper .helper-text {
        margin: 0 0 0.8rem;
        color: var(--text-sub);
      }

      .chord-tool-wrapper .form-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chord-tool-wrapper .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 0.35rem;
      }

      .chord-tool-wrapper .form-group select {
        width: 100%;
        border: 1px solid #bdd7c8;
        border-radius: 10px;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        font-family: inherit;
        color: var(--text-main);
        background: #fff;
      }

      .chord-tool-wrapper .form-group select:focus,
      .chord-tool-wrapper .copy-button:focus,
      .chord-tool-wrapper .preset-button:focus {
        outline: 3px solid rgba(75, 165, 127, 0.3);
        outline-offset: 1px;
      }

      .chord-tool-wrapper .generator-actions {
        margin-top: 0.8rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .chord-tool-wrapper .preset-button,
      .chord-tool-wrapper .copy-button {
        border: none;
        border-radius: 999px;
        padding: 0.5rem 0.9rem;
        font-size: 0.95rem;
        font-family: inherit;
        background: #e1f2e9;
        color: var(--primary-dark);
        cursor: pointer;
      }

      .chord-tool-wrapper .copy-button {
        background: var(--primary);
        color: #fff;
      }

      .chord-tool-wrapper .preset-button:hover,
      .chord-tool-wrapper .copy-button:hover {
        filter: brightness(0.97);
      }

      .chord-tool-wrapper .error-message {
        min-height: 1.5em;
        margin: 0.75rem 0 0;
        color: var(--error);
        font-weight: 500;
      }

      .chord-tool-wrapper .copy-status {
        min-height: 1.25rem;
        margin: 0 0 0.75rem;
        color: var(--text-sub);
      }

      .chord-tool-wrapper .result-list {
        margin: 0;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.6rem;
      }

      .chord-tool-wrapper .result-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.8rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.7rem 0.8rem;
        background: #fcfffd;
      }

      .chord-tool-wrapper .result-row dt {
        font-weight: 500;
      }

      .chord-tool-wrapper .result-row dd {
        margin: 0;
        text-align: right;
      }

      @media (max-width: 760px) {
        .chord-tool-wrapper .form-grid {
          grid-template-columns: 1fr;
        }

        .chord-tool-wrapper .result-row {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.2rem;
        }

        .chord-tool-wrapper .result-row dd {
          text-align: left;
        }

        .chord-tool-wrapper .generator-actions {
          flex-direction: column;
        }

        .chord-tool-wrapper .generator-actions button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="chord-tool-wrapper" id="chord-tool-wrapper">
      <main class="container">
        <section class="card" aria-labelledby="chord-tool-title">
          <h1 id="chord-tool-title">コード進行ジェネレーター</h1>
          <p class="description">キーとジャンルを選ぶだけで、作曲に使えるコード進行をすぐ表示できます。</p>
        </section>

        <section class="card" aria-labelledby="cp-input-heading">
          <h2 id="cp-input-heading">入力設定</h2>
          <p class="helper-text">はじめての作曲でも大丈夫！気になる設定を選んで「生成する」を押してね。</p>
          <form id="chord-generator-form" class="form-grid" novalidate>
            <div class="form-group">
              <label for="cp-key">キー</label>
              <select id="cp-key" name="key">
                <option>C</option><option>C# / Db</option><option>D</option><option>D# / Eb</option><option>E</option><option>F</option><option>F# / Gb</option><option>G</option><option>G# / Ab</option><option>A</option><option>A# / Bb</option><option>B</option>
              </select>
            </div>
            <div class="form-group">
              <label for="cp-mode">メジャー / マイナー</label>
              <select id="cp-mode" name="mode">
                <option>メジャー</option>
                <option>マイナー</option>
              </select>
            </div>
            <div class="form-group">
              <label for="cp-genre">ジャンル</label>
              <select id="cp-genre" name="genre">
                <option>kawaii future bass</option>
                <option>lofi hiphop</option>
                <option>J-POP</option>
                <option>切ない系</option>
                <option>明るい系</option>
              </select>
            </div>
            <div class="form-group">
              <label for="cp-bars">小節数</label>
              <select id="cp-bars" name="bars">
                <option value="4">4小節</option>
                <option value="8">8小節</option>
              </select>
            </div>
          </form>
          <p id="cp-error" class="error-message" role="alert" aria-live="assertive"></p>

          <div class="generator-actions">
            <button type="button" id="cp-generate" class="copy-button">生成する</button>
            <button type="button" id="cp-regenerate" class="preset-button">もう一度生成</button>
            <button type="button" id="cp-copy" class="preset-button">結果をコピー</button>
          </div>
        </section>

        <section class="card" aria-labelledby="cp-result-heading">
          <h2 id="cp-result-heading">生成結果</h2>
          <p id="cp-copy-status" class="copy-status" aria-live="polite"></p>
          <dl id="cp-result-list" class="result-list"></dl>
          <p id="cp-comment" class="helper-text"></p>
        </section>
      </main>
    </div>

    <script>
      (() => {
        'use strict';

        const wrapper = document.getElementById('chord-tool-wrapper');
        if (!wrapper) return;

        const generatorForm = wrapper.querySelector('#chord-generator-form');
        if (!generatorForm) return;

        const keySelect = wrapper.querySelector('#cp-key');
        const modeSelect = wrapper.querySelector('#cp-mode');
        const genreSelect = wrapper.querySelector('#cp-genre');
        const barsSelect = wrapper.querySelector('#cp-bars');
        const generateButton = wrapper.querySelector('#cp-generate');
        const regenerateButton = wrapper.querySelector('#cp-regenerate');
        const copyButton = wrapper.querySelector('#cp-copy');
        const errorMessage = wrapper.querySelector('#cp-error');
        const resultList = wrapper.querySelector('#cp-result-list');
        const copyStatus = wrapper.querySelector('#cp-copy-status');
        const commentText = wrapper.querySelector('#cp-comment');

        const KEY_ALIASES = { 'C# / Db': 'C#', 'D# / Eb': 'D#', 'F# / Gb': 'F#', 'G# / Ab': 'G#', 'A# / Bb': 'A#' };
        const SCALE_NOTES = {
          メジャー: {
            C: ['C', 'D', 'E', 'F', 'G', 'A', 'B'], 'C# / Db': ['Db', 'Eb', 'F', 'Gb', 'Ab', 'Bb', 'C'], D: ['D', 'E', 'F#', 'G', 'A', 'B', 'C#'], 'D# / Eb': ['Eb', 'F', 'G', 'Ab', 'Bb', 'C', 'D'], E: ['E', 'F#', 'G#', 'A', 'B', 'C#', 'D#'], F: ['F', 'G', 'A', 'Bb', 'C', 'D', 'E'], 'F# / Gb': ['Gb', 'Ab', 'Bb', 'B', 'Db', 'Eb', 'F'], G: ['G', 'A', 'B', 'C', 'D', 'E', 'F#'], 'G# / Ab': ['Ab', 'Bb', 'C', 'Db', 'Eb', 'F', 'G'], A: ['A', 'B', 'C#', 'D', 'E', 'F#', 'G#'], 'A# / Bb': ['Bb', 'C', 'D', 'Eb', 'F', 'G', 'A'], B: ['B', 'C#', 'D#', 'E', 'F#', 'G#', 'A#']
          },
          マイナー: {
            C: ['C', 'D', 'Eb', 'F', 'G', 'Ab', 'Bb'], 'C# / Db': ['C#', 'D#', 'E', 'F#', 'G#', 'A', 'B'], D: ['D', 'E', 'F', 'G', 'A', 'Bb', 'C'], 'D# / Eb': ['Eb', 'F', 'Gb', 'Ab', 'Bb', 'Cb', 'Db'], E: ['E', 'F#', 'G', 'A', 'B', 'C', 'D'], F: ['F', 'G', 'Ab', 'Bb', 'C', 'Db', 'Eb'], 'F# / Gb': ['F#', 'G#', 'A', 'B', 'C#', 'D', 'E'], G: ['G', 'A', 'Bb', 'C', 'D', 'Eb', 'F'], 'G# / Ab': ['G#', 'A#', 'B', 'C#', 'D#', 'E', 'F#'], A: ['A', 'B', 'C', 'D', 'E', 'F', 'G'], 'A# / Bb': ['Bb', 'C', 'Db', 'Eb', 'F', 'Gb', 'Ab'], B: ['B', 'C#', 'D', 'E', 'F#', 'G', 'A']
          }
        };

        const ROMAN_PRESETS = {
          'kawaii future bass': ['IV - V - iii - vi', 'vi - IV - V - I', 'I - V - vi - IV'],
          'lofi hiphop': ['ii - V - I - vi', 'Imaj7 - vi7 - ii7 - V7', 'vi - ii - V - I'],
          'J-POP': ['I - V - vi - IV', 'IV - V - iii - vi', 'vi - IV - I - V'],
          '切ない系': ['vi - IV - I - V', 'IV - V - iii - vi', 'ii - V - iii - vi'],
          '明るい系': ['I - IV - V - I', 'I - V - vi - IV', 'IV - I - V - vi']
        };

        const MODE_DEGREE_MAP = {
          メジャー: { I: '1', ii: '2m', iii: '3m', IV: '4', V: '5', vi: '6m', VII: '7dim', Imaj7: '1maj7', vi7: '6m7', ii7: '2m7', V7: '57' },
          マイナー: { i: '1m', ii: '2dim', III: '3', iv: '4m', v: '5m', VI: '6', VII: '7', i7: '1m7', iv7: '4m7', V7: '57', I: '1m', iii: '3', IV: '4m', V: '5m', vi: '6', Imaj7: '1m(maj7)', vi7: '6maj7', ii7: '2m7b5' }
        };

        const JP_COLON = '\uFF1A';
        const JP_PERIOD = '\u3002';

        const MODE_COMMENTS = {
          メジャー: `明るく王道感のあるコード進行です${JP_PERIOD}Aメロやサビの土台として使いやすいです${JP_PERIOD}`,
          マイナー: `少しエモくて深みのある進行です${JP_PERIOD}静かなAメロや切ない展開にハマりやすいです${JP_PERIOD}`
        };

        function noteFromDegree(mode, key, degree) {
          const scale = SCALE_NOTES[mode] && SCALE_NOTES[mode][key];
          const parsed = degree.match(/^([1-7])(.*)$/);
          if (!scale || !parsed) return null;
          const degreeIndex = Number.parseInt(parsed[1], 10) - 1;
          const suffix = parsed[2];
          const note = scale[degreeIndex];
          if (suffix === 'm') return note + 'm';
          if (suffix === 'dim') return note + 'dim';
          if (suffix === 'maj7') return note + 'maj7';
          if (suffix === 'm7') return note + 'm7';
          if (suffix === '7') return note + '7';
          if (suffix === 'm7b5') return note + 'm7b5';
          if (suffix === 'm(maj7)') return note + 'm(maj7)';
          return note;
        }

        function progressionToChords(mode, key, romanProgression) {
          const modeMap = MODE_DEGREE_MAP[mode];
          return romanProgression.split(' - ').map((roman) => {
            const degree = modeMap[roman] || MODE_DEGREE_MAP['メジャー'][roman] || '1';
            return noteFromDegree(mode, key, degree);
          });
        }

        function generateProgression() {
          const key = keySelect.value;
          const mode = modeSelect.value;
          const genre = genreSelect.value;
          const bars = Number.parseInt(barsSelect.value, 10);
          const presets = ROMAN_PRESETS[genre];

          if (!presets || !key || !mode || ![4, 8].includes(bars)) {
            errorMessage.textContent = '入力内容を確認してね。';
            return null;
          }

          errorMessage.textContent = '';
          const selected = presets[Math.floor(Math.random() * presets.length)];
          const baseRomans = selected.split(' - ');
          const cycle = bars === 8 ? baseRomans.concat(baseRomans) : baseRomans;
          const romanText = cycle.join(' - ');
          const chordText = progressionToChords(mode, key, romanText).join(' - ');

          return { keyLabel: key + mode, genre, chordText, romanText, comment: MODE_COMMENTS[mode] };
        }

        function renderResult(result) {
          const rows = [
            { label: '選択したキー', value: result.keyLabel },
            { label: '選択したジャンル', value: result.genre },
            { label: '生成されたコード進行', value: result.chordText },
            { label: 'ローマ数字表記', value: result.romanText }
          ];
          resultList.innerHTML = rows.map((row) => '<div class="result-row"><dt>' + row.label + '</dt><dd>' + row.value + '</dd></div>').join('');
          commentText.textContent = 'コメント' + JP_COLON + result.comment;
          return rows;
        }

        async function copyResult() {
          const rows = Array.from(resultList.querySelectorAll('.result-row'));
          if (!rows.length) {
            copyStatus.textContent = '先に生成してからコピーしてね。';
            return;
          }
          const text = rows.map((row) => row.querySelector('dt').textContent + JP_COLON + row.querySelector('dd').textContent).join('\n') + '\n' + commentText.textContent;
          try {
            if (navigator.clipboard && window.isSecureContext) {
              await navigator.clipboard.writeText(text);
            } else {
              const textarea = document.createElement('textarea');
              textarea.value = text;
              textarea.setAttribute('readonly', '');
              textarea.style.position = 'absolute';
              textarea.style.left = '-9999px';
              document.body.appendChild(textarea);
              textarea.select();
              const copied = document.execCommand('copy');
              document.body.removeChild(textarea);
              if (!copied) throw new Error('copy failed');
            }
            copyStatus.textContent = '結果をコピーしたよ！';
          } catch (error) {
            copyStatus.textContent = 'コピーに失敗しました。手動でコピーしてください。';
          }
        }

        function handleGenerate() {
          const result = generateProgression();
          if (!result) return;
          renderResult(result);
          copyStatus.textContent = '';
        }

        generatorForm.addEventListener('change', handleGenerate);
        generateButton.addEventListener('click', handleGenerate);
        regenerateButton.addEventListener('click', handleGenerate);
        copyButton.addEventListener('click', copyResult);
        handleGenerate();
      })();
    </script>
  </body>
</html>
